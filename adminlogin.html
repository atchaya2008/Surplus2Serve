<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login - Surplus2Serve</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            background-image: url('bglogin.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
            position: relative;
        }
        .login-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(211, 84, 0, 0.25);
            z-index: 1;
        }
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-top: 5px solid #d35400;
            backdrop-filter: blur(10px);
        }
        .login-card h2 {
            color: #d35400;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            font-weight: 700;
        }
        .subtitle {
            color: #8b5a2b;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            color: #8b5a2b;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #daa520;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background-color: #fffef5;
            color: #333;
        }
        .input-group input:focus {
            outline: none;
            border-color: #d35400;
            box-shadow: 0 0 0 0.3rem rgba(211, 84, 0, 0.15);
            background-color: #ffffff;
        }
        .error-message {
            color: #c44600;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
            background-color: #fed7d7;
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 3px solid #d35400;
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #d35400;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }
        .login-btn:hover {
            background-color: #c44600;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.4);
        }
        .password-toggle {
            cursor: pointer;
            color: #d35400;
            padding: 0.75rem 1rem;
            background: #fffef5;
            border: 2px solid #daa520;
            border-radius: 0 8px 8px 0;
            transition: var(--transition);
            border-left: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
        }
        .password-toggle:hover {
            background-color: #f5f5f5;
            border-color: #d35400;
        }
        .input-group-wrapper {
            display: flex;
            gap: 0;
            width: 100%;
            margin-top: 0.5rem;
        }
        .input-group-wrapper input {
            border-radius: 8px 0 0 8px;
            margin: 0;
            flex: 1;
        }
    </style>
</head>

<body class="login-page">

<div class="login-container">
    <div class="login-card">
        <h2 class="text-center">🔐 Admin Login</h2>
        <p class="text-center subtitle">Surplus2Serve Administration Portal</p>

        <form id="adminLoginForm">
            <div id="errorMessage" class="error-message" style="display:none;"></div>
            <div id="successMessage" class="error-message" style="display:none; background-color: #d4edda; color: #155724; border-left-color: #28a745;"></div>

            <div class="input-group">
                <label for="adminEmail">Administrator Email</label>
                <input type="email" id="adminEmail" placeholder="Enter admin email" required>
            </div>

            <div class="input-group">
                <label for="adminPassword">Password</label>
                <div class="input-group-wrapper">
                    <input type="password" id="adminPassword" placeholder="Enter password" required>
                    <span class="password-toggle" onclick="document.getElementById('adminPassword').type = document.getElementById('adminPassword').type === 'password' ? 'text' : 'password'">👁️</span>
                </div>
            </div>

            <div class="input-group">
                <label for="secretCode">Secret Code Phrase</label>
                <input type="password" id="secretCode" placeholder="Enter secret code" required>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <hr style="border-color: var(--border-color); margin-top: 2rem; margin-bottom: 1rem;">
        
        <div class="text-center">
            <a href="loginpage.html" style="text-decoration: none; font-size: 13px; color: var(--text-secondary); transition: var(--transition);" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-secondary)'">← Back to Main Login</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="notifications.js"></script>
<script src="adminlogin.js"></script>
</body>
</html>
