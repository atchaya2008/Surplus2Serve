<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Surplus2Serve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .notifications-page {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(16, 185, 129, 0.1) 100%);
            min-height: 100vh;
            padding: 30px 0;
        }
        .notifications-header {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notifications-title {
            font-size: 1.8rem;
            color: var(--text-primary);
            font-weight: bold;
            margin: 0;
        }
        .notification-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .filter-btn:hover {
            border-color: var(--primary-color);
        }
        .notifications-list {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }
        .notification-type-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .badge-post {
            background: rgba(245, 158, 11, 0.2);
            color: #92400e;
        }
        .badge-acceptance {
            background: rgba(16, 185, 129, 0.2);
            color: #065f46;
        }
        .badge-registration {
            background: rgba(59, 130, 246, 0.2);
            color: #1e40af;
        }
        .badge-approval {
            background: rgba(168, 85, 247, 0.2);
            color: #581c87;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-handshake brand-icon"></i>
                <span class="brand-text">Surplus2Serve</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="notifications.html">
                            <i class="fas fa-bell me-2"></i>Notifications
                            <span id="unreadBadge" class="notification-badge" style="display:none;"></span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn-login-nav" href="loginpage.html" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="notifications-page">
        <div class="container">
            <!-- Header -->
            <div class="notifications-header">
                <h1 class="notifications-title">
                    <i class="fas fa-bell me-2" style="color: var(--primary-color);"></i>Notifications
                </h1>
                <div class="notification-filters">
                    <button class="filter-btn active" onclick="filterNotifications('all')">All</button>
                    <button class="filter-btn" onclick="filterNotifications('post')">
                        <i class="fas fa-paste me-1"></i>Posts
                    </button>
                    <button class="filter-btn" onclick="filterNotifications('acceptance')">
                        <i class="fas fa-check-circle me-1"></i>Accepted
                    </button>
                    <button class="filter-btn" onclick="filterNotifications('registration')">
                        <i class="fas fa-user-plus me-1"></i>Registrations
                    </button>
                    <button class="filter-btn" onclick="filterNotifications('approval')">
                        <i class="fas fa-thumbs-up me-1"></i>Approvals
                    </button>
                </div>
            </div>

            <!-- Notifications List -->
            <div class="notifications-list">
                <div id="notificationsContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-inbox"></i>
                        </div>
                        <p>No notifications yet</p>
                        <small class="text-muted">When you start using the platform, you'll see notifications here</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-section mt-5">
        <div class="container">
            <div class="footer-bottom">
                <p class="text-center mb-0">
                    &copy; 2024 Surplus2Serve. All rights reserved. | 
                    Made with <i class="fas fa-heart text-danger"></i> for a better world
                </p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="notifications.js"></script>
    <script>
        // Load notifications on page load
        window.addEventListener('DOMContentLoaded', function() {
            const userEmail = localStorage.getItem('userEmail');
            const userRole = localStorage.getItem('userRole');
            
            if(!userEmail || !userRole) {
                window.location.href = 'loginpage.html';
                return;
            }

            displayNotifications(userEmail, userRole);
            updateUnreadCount(userEmail, userRole);
        });

        function filterNotifications(type) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            const userEmail = localStorage.getItem('userEmail');
            const userRole = localStorage.getItem('userRole');
            let userNotifications = notificationManager.getNotificationsForUser(userEmail, userRole);

            if(type !== 'all') {
                userNotifications = userNotifications.filter(n => n.type === type);
            }

            const container = document.getElementById('notificationsContainer');
            
            if(userNotifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <p>No notifications of this type</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = userNotifications.map(notif => `
                <div class="notification-item ${notif.read ? 'read' : 'unread'}" data-id="${notif.id}">
                    <div class="notification-type-badge badge-${notif.type}">
                        ${notif.type.toUpperCase()}
                    </div>
                    <div class="notification-header">
                        <h5 class="notification-title">${notif.title}</h5>
                        <span class="notification-time">${formatTime(notif.timestamp)}</span>
                    </div>
                    <p class="notification-message">${notif.message}</p>
                    ${notif.additionalData ? `
                        <div class="modal-additional-info">
                            ${Object.entries(notif.additionalData).map(([key, value]) => 
                                `<p><strong>${key}:</strong> ${value}</p>`
                            ).join('')}
                        </div>
                    ` : ''}
                    <div class="notification-actions">
                        <button class="btn btn-sm btn-outline-primary" onclick="markAsRead(${notif.id})">
                            ${notif.read ? '<i class="fas fa-check-double"></i> Read' : '<i class="fas fa-envelope-open"></i> Mark as Read'}
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteNotification(${notif.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateUnreadCount(userEmail, userRole) {
            const unreadCount = notificationManager.getUnreadCount(userEmail, userRole);
            const badge = document.getElementById('unreadBadge');
            
            if(unreadCount > 0) {
                badge.textContent = unreadCount;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }

        function logout() {
            if(confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userRole');
                localStorage.removeItem('donorLoggedIn');
                localStorage.removeItem('ngoLoggedIn');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
