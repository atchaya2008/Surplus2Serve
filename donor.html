<!DOCTYPE html>
<html lang="en">
<head>
    <title>Donor Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Maps Fallback -->
    <style>
        #mapContainer {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .location-btn {
            width: 100%;
            padding: 10px;
            background-color: #d35400;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .location-btn:hover {
            background-color: #c44600;
            transform: translateY(-2px);
        }
        .location-display {
            background-color: #fffef5;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #333;
        }
        .location-display.selected {
            background-color: #fff8f0;
            border-left: 4px solid #d35400;
        }
        #mapModal {
            display: none;
        }
    </style>
</head>

<body style="background-color: #fef3e6;">

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">Donor Dashboard</span>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="text-success mb-3">Upload Surplus Food</h3>

    <form class="card p-4 shadow" onsubmit="addDonation(event)">

        <input type="text" id="foodName" class="form-control mb-3" placeholder="Food Name" required>

        <select id="foodType" class="form-control mb-3" required>
            <option value="">Select Type</option>
            <option>Veg</option>
            <option>Non-Veg</option>
        </select>

        <input type="number" id="servings" class="form-control mb-3" placeholder="Number of Servings" required>

        <label>Expiry Time:</label>
        <input type="datetime-local" id="expiry" class="form-control mb-3" required>

        <input type="text" id="address" class="form-control mb-3" placeholder="Address" required>

        <input type="tel" id="contact" class="form-control mb-3" placeholder="Contact Number" required>

        <label class="form-label"><strong>📍 Select Location:</strong></label>
        <div id="locationDisplay" class="location-display">
            <span id="locationText">No location selected</span>
        </div>
        <button type="button" class="location-btn" onclick="getCurrentLocationGPS()"><i class="fas fa-location-arrow"></i> Use GPS</button>
        <input type="hidden" id="location" required>
        <input type="hidden" id="latitude">
        <input type="hidden" id="longitude">

        <textarea id="notes" class="form-control mb-3" placeholder="Additional Notes"></textarea>

        <button class="btn btn-success">Submit</button>
    </form>

    <h3 class="text-success mt-5">Your Donations</h3>
    <div class="row mt-3" id="donationList"></div>

    <!-- Map Selection Modal -->
    <div id="mapModal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h5><i class="fas fa-map"></i> Select Your Location</h5>
                <button type="button" class="btn-close" onclick="closeMapModal()"></button>
            </div>
            <div class="modal-body">
                <p style="font-size: 14px; color: #666; margin-bottom: 15px;">Select your food pickup/delivery location</p>
                <div id="mapContainer"></div>
                <div style="background-color: #f8f9fa; padding: 10px; border-radius: 5px; margin-top: 10px;">
                    <p style="margin: 0; font-size: 13px;"><strong>Click on map or enter coordinates:</strong></p>
                    <input type="text" id="addressSearchBox" placeholder="Search address..." style="width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px;">
                    <small><strong>Selected Coordinates:</strong><br>
                    Latitude: <span id="selectedLat">-</span>, Longitude: <span id="selectedLng">-</span></small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeMapModal()">Cancel</button>
                <button type="button" class="btn btn-success" onclick="confirmLocation()" id="confirmBtn" disabled>
                    <i class="fas fa-check"></i> Confirm Location
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h5 id="modalTitle">Confirm Action</h5>
                <button type="button" class="btn-close" onclick="closeNotificationModal()"></button>
            </div>
            <div class="modal-body">
                <p id="modalMessage">Are you sure?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeNotificationModal()">Cancel</button>
                <button type="button" class="btn btn-danger" id="deleteConfirmBtn" onclick="confirmDeleteDonation()">Delete</button>
            </div>
        </div>
    </div>

</div>

<script src="notifications.js"></script>
<script src="donor.js"></script>
<script>
    displayDonations();
</script>

</body>
</html>
