<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Surplus2Serve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .register-page {
            background: linear-gradient(135deg, #d35400 0%, #f39c12 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .register-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 2;
        }

        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-top: 5px solid #d35400;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h2 {
            color: #d35400;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #d35400;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #c44600;
            transform: translateX(-5px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d35400;
            background-color: white;
            box-shadow: 0 0 8px rgba(211, 84, 0, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .hidden {
            display: none !important;
        }

        .error-message {
            display: none;
            background-color: #fee;
            color: #c00;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #d35400;
            font-size: 0.95rem;
        }

        .error-message.show {
            display: block;
        }

        .role-section-title {
            color: #d35400;
            font-weight: 700;
            font-size: 1.05rem;
            margin-top: 25px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f39c12;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: #d35400;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-register:hover {
            background-color: #c44600;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.95rem;
        }

        .login-link a {
            color: #d35400;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .register-card {
                padding: 25px;
            }

            .register-header h2 {
                font-size: 1.5rem;
            }

            .form-group input,
            .form-group select,
            .form-group textarea {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .register-page {
                padding: 10px;
            }

            .register-card {
                padding: 20px;
            }

            .register-header h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="register-page">
    <div class="register-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left me-2"></i>Back
        </a>

        <div class="register-card">
            <div class="register-header">
                <h2><i class="fas fa-user-plus me-2"></i>Create Account</h2>
                <p>Join Surplus2Serve and make a difference</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="registerForm" novalidate>

                <div class="form-group">
                    <label for="fullName"><i class="fas fa-user me-2"></i>Full Name *</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope me-2"></i>Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone me-2"></i>Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock me-2"></i>Password *</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword"><i class="fas fa-lock me-2"></i>Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password">
                </div>

                <div class="form-group">
                    <label for="role"><i class="fas fa-building me-2"></i>User Role *</label>
                    <select id="role" name="role">
                        <option value="">-- Select Role --</option>
                        <option value="donor">Donor / Business</option>
                        <option value="ngo">NGO / Organization</option>
                    </select>
                </div>

                <div id="donorFields" class="hidden">
                    <h5 class="role-section-title">Business Information</h5>
                    
                    <div class="form-group">
                        <label for="organization"><i class="fas fa-building me-2"></i>Organization Name (Optional)</label>
                        <input type="text" id="organization" name="organization" placeholder="Your business/organization name">
                    </div>

                    <div class="form-group">
                        <label for="donorAddress"><i class="fas fa-map-pin me-2"></i>Full Address *</label>
                        <textarea id="donorAddress" name="donorAddress" placeholder="Enter your full business address"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="donorCity"><i class="fas fa-city me-2"></i>City *</label>
                        <input type="text" id="donorCity" name="donorCity" placeholder="Enter city">
                    </div>

                    <div class="form-group">
                        <label for="donorPincode"><i class="fas fa-mailbox me-2"></i>Postal Code *</label>
                        <input type="text" id="donorPincode" name="donorPincode" placeholder="Enter postal/zip code">
                    </div>
                </div>

                <div id="ngoFields" class="hidden">
                    <h5 class="role-section-title">Organization Details</h5>
                    
                    <div class="form-group">
                        <label for="ngoName"><i class="fas fa-building me-2"></i>NGO Name *</label>
                        <input type="text" id="ngoName" name="ngoName" placeholder="Enter your organization name">
                    </div>

                    <div class="form-group">
                        <label for="ngoRegistration"><i class="fas fa-file-alt me-2"></i>Registration Number *</label>
                        <input type="text" id="ngoRegistration" name="ngoRegistration" placeholder="Enter NGO/Charity registration number">
                    </div>

                    <div class="form-group">
                        <label for="ngoDescription"><i class="fas fa-info-circle me-2"></i>About Your Organization *</label>
                        <textarea id="ngoDescription" name="ngoDescription" placeholder="Brief description of your organization and mission"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="ngoAddress"><i class="fas fa-map-pin me-2"></i>Full Address *</label>
                        <textarea id="ngoAddress" name="ngoAddress" placeholder="Enter organization address"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="ngoCity"><i class="fas fa-city me-2"></i>City *</label>
                        <input type="text" id="ngoCity" name="ngoCity" placeholder="Enter city">
                    </div>

                    <div class="form-group">
                        <label for="ngoPincode"><i class="fas fa-mailbox me-2"></i>Postal Code *</label>
                        <input type="text" id="ngoPincode" name="ngoPincode" placeholder="Enter postal/zip code">
                    </div>

                    <div class="form-group">
                        <label for="beneficiaries"><i class="fas fa-users me-2"></i>Target Beneficiaries *</label>
                        <select id="beneficiaries" name="beneficiaries">
                            <option value="">-- Select Target Group --</option>
                            <option value="children">Children</option>
                            <option value="elderly">Elderly</option>
                            <option value="homeless">Homeless</option>
                            <option value="disabled">Disabled Persons</option>
                            <option value="mixed">Mixed/General Public</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>

                <p class="login-link">
                    Already have an account?
                    <a href="loginpage.html">Login here</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="notifications.js"></script>
<script src="registerpage.js"></script>

</body>
</html>

        .back-link:hover {
            transform: translateX(-3px);

        }

            color: #d35400;

            margin-top: 2rem;

</head>
<body>

<div class="register-page">
    <div class="register-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left me-2"></i>Back to Home
        </a>
        <div class="register-card">
            <h2><i class="fas fa-user-plus me-2" style="color: #d35400;"></i>Create Account</h2>
            <p class="subtitle">Join Surplus2Serve and make a difference</p>

            <form id="registerForm">

                <!-- General Fields -->
                <div class="input-group">
                    <label><i class="fas fa-user me-2"></i>Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-envelope me-2"></i>Email Address *</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-phone me-2"></i>Phone Number *</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock me-2"></i>Password *</label>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock me-2"></i>Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-building me-2"></i>User Role *</label>
                    <select id="role" required onchange="toggleRoleFields()">
                        <option value="">-- Select Role --</option>
                        <option value="donor">Donor / Business</option>
                        <option value="ngo">NGO / Organization</option>
                    </select>
                </div>

                <p id="errorMessage" class="error-message"></p>

                <!-- Donor Fields -->
                <div id="donorFields" class="hidden">
                    <h5 class="role-section-title">Business Information</h5>
                    <div class="input-group">
                        <label><i class="fas fa-building me-2"></i>Organization Name (Optional)</label>
                        <input type="text" id="organization" placeholder="Your business/organization name">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-map-pin me-2"></i>Full Address *</label>
                        <textarea id="donorAddress" placeholder="Enter your full business address" rows="3"></textarea>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-city me-2"></i>City *</label>
                        <input type="text" id="donorCity" placeholder="Enter city" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-mailbox me-2"></i>Postal Code *</label>
                        <input type="text" id="donorPincode" placeholder="Enter postal/zip code" required>
                    </div>
                </div>

                <!-- NGO Fields -->
                <div id="ngoFields" class="hidden">
                    <h5 class="role-section-title">Organization Details</h5>
                    <div class="input-group">
                        <label><i class="fas fa-building me-2"></i>NGO Name *</label>
                        <input type="text" id="ngoName" placeholder="Enter your organization name" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-file-alt me-2"></i>Registration Number *</label>
                        <input type="text" id="ngoRegistration" placeholder="Enter NGO/Charity registration number" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-info-circle me-2"></i>About Your Organization *</label>
                        <textarea id="ngoDescription" placeholder="Brief description of your organization and mission" rows="3" required></textarea>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-map-pin me-2"></i>Full Address *</label>
                        <textarea id="ngoAddress" placeholder="Enter organization address" rows="3" required></textarea>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-city me-2"></i>City *</label>
                        <input type="text" id="ngoCity" placeholder="Enter city" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-mailbox me-2"></i>Postal Code *</label>
                        <input type="text" id="ngoPincode" placeholder="Enter postal/zip code" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-users me-2"></i>Target Beneficiaries *</label>
                        <select id="beneficiaries" required>
                            <option value="">-- Select Target Group --</option>
                            <option value="children">Children</option>
                            <option value="elderly">Elderly</option>
                            <option value="homeless">Homeless</option>
                            <option value="disabled">Disabled Persons</option>
                            <option value="mixed">Mixed/General Public</option>
                        </select>
                    </div>
                </div>

                <!-- Register Button -->
                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>

                <!-- Login Link -->
                <p class="login-link">
                    Already have an account?
                    <a href="loginpage.html">Login here</a>
                </p>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleRoleFields() {
    const role = document.getElementById('role').value;
    const donorFields = document.getElementById('donorFields');
    const ngoFields = document.getElementById('ngoFields');
    
    donorFields.classList.add('hidden');
    ngoFields.classList.add('hidden');
    
    if (role === 'donor') {
        donorFields.classList.remove('hidden');
    } else if (role === 'ngo') {
        ngoFields.classList.remove('hidden');
    }
}
</script>
<script src="notifications.js"></script>
<script src="registerpage.js"></script>
</body>
