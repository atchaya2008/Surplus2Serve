<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard - Surplus2Serve</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-navbar {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            box-shadow: var(--shadow-md);
            padding: 1rem 0;
        }
        .admin-navbar .navbar-brand {
            color: white !important;
            font-weight: 700;
            font-size: 1.5rem;
        }
        .admin-navbar .btn-logout {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            transition: var(--transition);
        }
        .admin-navbar .btn-logout:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }
        .admin-content {
            background-color: #fef3e6;
            min-height: calc(100vh - 70px);
            padding: 2rem 0;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }
        .section-header h4 {
            margin: 0;
            color: var(--text-primary);
        }
        .activity-log {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            max-height: 400px;
            overflow-y: auto;
        }
        .activity-item {
            padding: 0.75rem;
            border-left: 3px solid var(--primary-color);
            margin-bottom: 1rem;
            background: var(--light-bg);
            border-radius: 4px;
        }
        .activity-item:last-child {
            margin-bottom: 0;
        }
        .activity-message {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .activity-time {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .card-donation {
            border-left: 4px solid var(--danger-color);
            background: white;
            box-shadow: var(--shadow-sm);
        }
        .card-ngo {
            border-top: 3px solid var(--success-color);
            background: white;
            box-shadow: var(--shadow-sm);
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            transition: var(--transition);
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>

<body>

<nav class="admin-navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand">📊 Admin Dashboard</span>
        <button class="btn-logout" onclick="adminLogout()">
            <i class="fas fa-sign-out-alt me-2"></i>Logout
        </button>
    </div>
</nav>

<div class="admin-content">
    <div class="container">
        <!-- Activity Log Section -->
        <div class="section-header">
            <i class="fas fa-clipboard-list" style="color: var(--primary-color); font-size: 1.3rem;"></i>
            <h4>📊 Activity Log</h4>
        </div>
        <div class="activity-log mb-4" id="activityLog">
            <div class="empty-state">
                <i class="fas fa-calendar-alt"></i>
                <p>No activities yet</p>
            </div>
        </div>

        <!-- Donations Section -->
        <div class="section-header">
            <i class="fas fa-utensils" style="color: var(--danger-color); font-size: 1.3rem;"></i>
            <h4>🍱 Donor Uploads</h4>
        </div>
        <div class="row mb-4" id="donationList">
            <div class="col-12">
                <div class="empty-state">
                    <i class="fas fa-box"></i>
                    <p>No active donations</p>
                </div>
            </div>
        </div>

        <!-- NGO Approval Section -->
        <div class="section-header">
            <i class="fas fa-building" style="color: var(--success-color); font-size: 1.3rem;"></i>
            <h4>🏢 NGO Approval</h4>
        </div>
        <div class="row" id="ngoList">
            <div class="col-12">
                <div class="empty-state">
                    <i class="fas fa-check-circle"></i>
                    <p>No pending NGO approvals</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="notifications.js"></script>
<script src="admin.js"></script>
</body>
</html>
